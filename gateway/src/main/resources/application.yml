server:
  port: 8080

spring:
  application:
    name: money-cloud-gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: user-route
          uri: http://localhost:8081
          predicates:
            - Path=/user/**
          filters:
            - StripPrefix=1
        - id: monee-route
          uri: http://localhost:8082
          predicates:
            - Path=/monee/**
          filters:
            - StripPrefix=1
        - id: note-route
          uri: http://localhost:8083
          predicates:
            - Path=/note/**
          filters:
            - StripPrefix=1

logging:
  level:
    org.springframework.cloud.gateway: info

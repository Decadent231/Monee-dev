server:
  port: 8082

spring:
  application:
    name: money-cloud-monee
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:101.201.235.13}:${MYSQL_PORT:3306}/money_cloud_monee?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:change-me}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

security:
  jwt:
    secret: ${JWT_SECRET:bW9uZXktY2xvdWQtdW5pZmllZC1zZWNyZXQtbW9uZXktY2xvdWQtdW5pZmllZC1zZWNyZXQ=}
    expire-seconds: ${JWT_EXPIRE_SECONDS:63072000}

logging:
  level:
    com.money.cloud: info
